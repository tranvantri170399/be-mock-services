server:
  port: 8081

spring:
  application:
    name: be-wallet-mock

# gRPC server configuration
grpc:
  server:
    port: 9093
  
  datasource:
    url: jdbc:h2:mem:walletdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  wallet:
    initial-balance: 1000000  # in cents (10000.00)
    currency: VND
